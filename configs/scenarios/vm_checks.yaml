scenario_id: vm_checks_001
scenario_name: VM Detection Checks
description: >
  Focused evaluation of hypervisor and sandbox fingerprinting surface.
  Al-khaser runs with all VM-relevant flag groups; pafish adds corroborating
  coverage of the same artifact set.  Overlapping results are deduplicated.
version: "2.0"

tools:
  alkhaser:
    timeout: 300
    sleep: 5
  pafish:
    timeout: 60

categories:
  - id: vm_checks
    name: VM Detection Checks
    weight: 1.0
    alkhaser_flags:
      - GEN_SANDBOX
      - VBOX
      - VMWARE
      - VPC
      - QEMU
      - KVM
      - XEN
      - WINE
      - PARALLELS
      - HYPERV
    pafish: true

pafish_keywords:
  vm_checks:
    - cpu
    - registry
    - process
    - file
    - disk
    - memory
    - screen
    - mouse
    - mac
    - bios
    - acpi
    - generic
    - network
    - system
    - rdtsc
    - wine
    - virtualbox
    - vmware
    - qemu
    - kvm
    - hypervisor
    - debugger
    - debug

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
