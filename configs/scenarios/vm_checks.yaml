scenario_id: vm_checks_001
scenario_name: VM Detection Checks
description: >
  Focused evaluation of hypervisor and sandbox fingerprinting surface.
  Al-khaser runs all VM flag groups; pafish adds corroborating coverage.
  MITRE ATT&CK: T1497 — Virtualization/Sandbox Evasion.
version: "2.0"

tools:
  alkhaser:
    timeout: 300
    sleep: 2
  pafish:
    timeout: 60

categories:
  - id: vm_checks
    name: VM Detection Checks
    weight: 1.0
    mitre: "T1497"
    alkhaser_flags:
      - GEN_SANDBOX
      - VBOX
      - VMWARE
      - VPC
      - QEMU
      - KVM
      - XEN
      - WINE
      - PARALLELS
      - HYPERV
    pafish: true

# In a focused vm_checks run all pafish output goes to vm_checks.
# Behavioural checks are excluded; no category splitting is needed.
pafish_sections:
  "Debuggers detection":              vm_checks
  "CPU information based detections": vm_checks
  "Generic reverse turing tests":     exclude
  "Generic sandbox detection":        vm_checks
  "Hooks detection":                  vm_checks
  "Sandboxie detection":              vm_checks
  "Wine detection":                   vm_checks
  "VirtualBox detection":             vm_checks
  "VMware detection":                 vm_checks
  "Qemu detection":                   vm_checks
  "Bochs detection":                  vm_checks
  "Cuckoo detection":                 vm_checks

pafish_label_overrides:
  "Checking mouse movement":                exclude
  "Checking mouse speed":                   exclude
  "Checking mouse click activity":          exclude
  "Checking mouse double click activity":   exclude
  "Checking dialog confirmation":           exclude
  "Checking plausible dialog confirmation": exclude

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
