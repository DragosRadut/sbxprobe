scenario_id: baseline_001
scenario_name: Baseline Transparency Evaluation
description: >
  Multi-tool baseline run covering all four transparency categories.
  Al-khaser runs once per category using its native flag groups — every check
  output is automatically assigned to the category that triggered it, requiring
  no keyword matching.  Pafish runs once and is classified by pafish_keywords.
  Overlapping checks (same technique covered by both tools) are deduplicated
  before scoring so no condition is counted twice.
version: "2.0"

tools:
  alkhaser:
    timeout: 300
    sleep: 10
  pafish:
    timeout: 60

categories:
  - id: vm_checks
    name: VM Detection Checks
    weight: 0.35
    alkhaser_flags:
      - GEN_SANDBOX
      - VBOX
      - VMWARE
      - VPC
      - QEMU
      - KVM
      - XEN
      - WINE
      - PARALLELS
      - HYPERV
    pafish: true

  - id: anti_debug
    name: Anti-Debug Checks
    weight: 0.30
    alkhaser_flags:
      - TLS
      - DEBUG
    pafish: true

  - id: timing_attacks
    name: Timing Attacks
    weight: 0.20
    alkhaser_flags:
      - TIMING_ATTACKS
    pafish: true

  - id: analysis_tools
    name: Analysis Tool Detection
    weight: 0.15
    alkhaser_flags:
      - ANALYSIS_TOOLS
      - ANTI_DISASSM
    pafish: false

# ── Pafish classification map ─────────────────────────────────────────────────
# Pafish runs all its checks in one invocation with no --check filtering.
# This ordered map classifies each pafish result into a scoring category.
# First match wins, so more specific rules (e.g. rdtsc) come before broad ones.
pafish_keywords:
  timing_attacks:
    - rdtsc
  anti_debug:
    - debugger
    - debug
  vm_checks:
    - cpu
    - registry
    - process
    - file
    - disk
    - memory
    - screen
    - mouse
    - mac
    - bios
    - acpi
    - generic
    - network
    - system
    - wine
    - virtualbox
    - vmware
    - qemu
    - kvm
    - hypervisor

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
