scenario_id: anti_debug_001
scenario_name: Anti-Debug Checks
description: >
  Evaluates how detectable the environment is to anti-debugging probes.
  Covers: Windows API checks (IsDebuggerPresent, CheckRemoteDebuggerPresent,
  WudfIs*DebuggerPresent), PEB flag inspection (BeingDebugged, NtGlobalFlag),
  heap flag tricks (Flags, ForceFlags, LFH), NtQueryInformationProcess variants
  (ProcessDebugPort, ProcessDebugFlags, ProcessDebugObject), handle tricks
  (CloseHandle/NtClose, SetHandleInformation), thread hiding, exception-based
  detection (UnhandledExceptionFilter, OutputDebugString), breakpoint probes
  (hardware, software, memory/PAGE_GUARD, page exception), interrupt tricks
  (0x2D, 0x1), trap flag, parent process check, SeDebugPrivilege, kernel
  debugger detection (KdDebuggerEnabled, SharedUserData,
  SystemKernelDebuggerInformation), NtQueryObject, NtYieldExecution /
  SwitchToThread, write-watch, job object, API hook detection, known debugger
  process enumeration, and TLS callbacks.
  Uses al-khaser as the sole probe backend.
version: "1.0"

tools:
  alkhaser:
    timeout: 120
    sleep: 5
    checks:
      - DEBUG
      - TLS

categories:
  - id: anti_debug
    name: Anti-Debug Checks
    weight: 1.0
    keywords:
      # ── Windows API checks ──────────────────────────────────────────────────
      - isdebuggerpresent
      - checkremotedebuggerpresent
      - beingdebugged
      - ntglobalflag
      - peb

      # ── WUDF debugger checks ─────────────────────────────────────────────────
      - wudf

      # ── Heap flag tricks ────────────────────────────────────────────────────
      - processheap
      - heap flag
      - heap force
      - low fragmentation heap

      # ── NtQueryInformationProcess variants ─────────────────────────────────
      - ntqueryinformationprocess
      - processdebugport
      - processdebugflags
      - processdebugobject
      - processdebug

      # ── Handle tricks ────────────────────────────────────────────────────────
      - closehandle
      - ntclose
      - sethandleinformation
      - protected handle
      - ntsystemdebugcontrol

      # ── Thread hiding ────────────────────────────────────────────────────────
      - threadhidefromdebugger
      - thread hide

      # ── Exception-based detection ───────────────────────────────────────────
      - unhandledexcep
      - outputdebugstring

      # ── Breakpoint detection ─────────────────────────────────────────────────
      - hardware breakpoint
      - software breakpoint
      - memory breakpoint
      - page guard
      - page exception
      - interupt
      - interrupt

      # ── Interrupt tricks ─────────────────────────────────────────────────────
      - int 0x2d
      - int 0x1
      - trap flag

      # ── Context / privileges ────────────────────────────────────────────────
      - parent process
      - sedebuggprivilege
      - sedebugprivilege
      - csrss

      # ── Kernel / object queries ─────────────────────────────────────────────
      - ntqueryobject
      - objecttypeinformation
      - objectalltypes
      - ntyieldexecution
      - switchtothread
      - kerneldebugger
      - kernel debugger
      - kddebuggeren
      - shareuserdata
      - systemkerneldebugger

      # ── Memory-based tricks ──────────────────────────────────────────────────
      - write watch
      - virtualalloc write

      # ── Job object / API hooks ───────────────────────────────────────────────
      - process is in a job
      - api hooks

      # ── TLS callbacks ────────────────────────────────────────────────────────
      - tls

      # ── Known debugger processes ─────────────────────────────────────────────
      - windbg
      - ollydbg
      - x64dbg
      - x32dbg
      - immunity

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
