scenario_id: anti_debug_001
scenario_name: Anti-Debug Checks
description: >
  Focused evaluation of debugger-detection surface. Covers TLS callbacks,
  PEB flags, NtQuery* APIs, handle tricks, breakpoint probes, interrupt tricks,
  kernel debugger checks, write-watch, job object, API hook detection, and
  module enumeration walks.
  MITRE ATT&CK: T1622 — Debugger Evasion.
version: "2.0"

tools:
  alkhaser:
    timeout: 120
    sleep: 2
  pafish:
    timeout: 60

categories:
  - id: anti_debug
    name: Anti-Debug Checks
    weight: 1.0
    mitre: "T1622"
    alkhaser_flags:
      - DEBUG
      - TLS
    pafish: true

# In a focused anti_debug run, only debugger-related pafish sections are scored.
# VM artefact sections are excluded so they don't inflate the anti-debug score.
pafish_sections:
  "Debuggers detection":              anti_debug
  "CPU information based detections": exclude
  "Generic reverse turing tests":     exclude
  "Generic sandbox detection":        exclude
  "Hooks detection":                  anti_debug
  "Sandboxie detection":              exclude
  "Wine detection":                   exclude
  "VirtualBox detection":             exclude
  "VMware detection":                 exclude
  "Qemu detection":                   exclude
  "Bochs detection":                  exclude
  "Cuckoo detection":                 anti_debug

pafish_label_overrides:
  "Checking mouse movement":                exclude
  "Checking mouse speed":                   exclude
  "Checking mouse click activity":          exclude
  "Checking mouse double click activity":   exclude
  "Checking dialog confirmation":           exclude
  "Checking plausible dialog confirmation": exclude

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
