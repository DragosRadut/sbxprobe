scenario_id: anti_debug_001
scenario_name: Anti-Debug Checks
description: >
  Focused evaluation of debugger-detection surface.  Covers TLS callbacks,
  PEB flags, NtQuery* APIs, handle tricks, breakpoint probes (hardware,
  software, memory PAGE_GUARD, page exception), interrupt tricks, kernel
  debugger checks, write-watch, job object, and API hook detection.
  Al-khaser uses DEBUG and TLS flags; pafish contributes its debugger section.
version: "2.0"

tools:
  alkhaser:
    timeout: 120
    sleep: 5
  pafish:
    timeout: 60

categories:
  - id: anti_debug
    name: Anti-Debug Checks
    weight: 1.0
    alkhaser_flags:
      - DEBUG
      - TLS
    pafish: true

# For this focused scenario all pafish output goes to anti_debug.
# (Pafish's VM artifact checks are intentionally captured here so that
#  none of its results are silently discarded in a focused run.)
pafish_keywords:
  anti_debug:
    - debugger
    - debug
    - cpu
    - registry
    - process
    - file
    - disk
    - memory
    - screen
    - mouse
    - mac
    - bios
    - acpi
    - generic
    - network
    - system
    - rdtsc
    - wine
    - virtualbox
    - vmware
    - qemu
    - kvm
    - hypervisor

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
