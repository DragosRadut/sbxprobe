scenario_id: analysis_tools_001
scenario_name: Analysis Tool Detection
description: >
  Focused evaluation of analysis-tool and anti-instrumentation detection surface.
  Covers debuggers (OllyDbg, x64dbg, WinDbg, IDA, Immunity, Cheat Engine),
  SysInternals tools (Process Explorer, Process Monitor, TCPView, Autoruns),
  network analyzers (Wireshark, Fiddler), instrumentation frameworks (Frida,
  Ghidra, Radare2, dnSpy), PE tools, sandbox process names, and anti-disassembly
  tricks.  Al-khaser only — pafish does not cover this category.
version: "2.0"

tools:
  alkhaser:
    timeout: 120
    sleep: 5

categories:
  - id: analysis_tools
    name: Analysis Tool Detection
    weight: 1.0
    alkhaser_flags:
      - ANALYSIS_TOOLS
      - ANTI_DISASSM
    pafish: false

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
