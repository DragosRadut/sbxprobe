scenario_id: timing_attacks_001
scenario_name: Timing Attacks
description: >
  Focused evaluation of timing-based anti-sandbox evasion surface.
  Covers RDTSC delta (plain and Locky variant), NtDelayExecution / Sleep
  acceleration, GetTickCount drift, SetTimer, timeSetEvent, WaitForSingleObject,
  WaitForMultipleObjects, IcmpSendEcho, CreateWaitableTimer,
  and CreateTimerQueueTimer.
  Al-khaser uses the TIMING_ATTACKS flag; pafish contributes RDTSC checks.
version: "2.0"

tools:
  alkhaser:
    timeout: 120
    sleep: 5
  pafish:
    timeout: 60

categories:
  - id: timing_attacks
    name: Timing Attacks
    weight: 1.0
    alkhaser_flags:
      - TIMING_ATTACKS
    pafish: true

pafish_keywords:
  timing_attacks:
    - rdtsc
    - cpu
    - registry
    - process
    - file
    - disk
    - memory
    - screen
    - mouse
    - mac
    - bios
    - acpi
    - generic
    - network
    - system
    - wine
    - virtualbox
    - vmware
    - qemu
    - kvm
    - hypervisor
    - debugger
    - debug

scoring:
  detected_value: 0.0
  not_detected_value: 1.0
  error_behavior: exclude
