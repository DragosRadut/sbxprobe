# Per-check MITRE ATT&CK + Checkpoint Evasions mapping
# Generated from: MITRE ATT&CK v16 + Checkpoint Evasions Encyclopedia
# https://attack.mitre.org  |  https://evasions.checkpoint.com

# ── MITRE technique reference ─────────────────────────────────────────────────
# T1497     Virtualization/Sandbox Evasion (parent)
# T1497.001 System Checks — static artifact inspection (registry, files, CPUID flags, MAC, WMI)
# T1497.002 User Activity Based Checks — mouse movement, last input time
# T1497.003 Time Based Evasion — RDTSC delta, sleep-skipping detection
# T1622     Debugger Evasion — PEB flags, NtQuery*, breakpoints, heap tricks
# T1518.001 Security Software Discovery — process enumeration for analysis tools


# ═══════════════════════════════════════════════════════════════════
# VM CHECKS  (al-khaser: GEN_SANDBOX, VBOX, VMWARE, VPC, QEMU, KVM,
#             XEN, WINE, PARALLELS, HYPERV  +  pafish all VM sections)
# ═══════════════════════════════════════════════════════════════════

# ── CPUID / hypervisor CPU fingerprinting ─────────────────────────
checking_if_cpu_hypervisor_field_is_set_using_cpuid_0x1:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    CPUID leaf 0x1 ECX bit 31 is the hypervisor present bit; set by VirtualBox, VMware,
    KVM, Hyper-V and all major type-2 hypervisors. Cannot be masked without modifying
    the hypervisor itself.

checking_hypervisor_vendor_using_cpuid_0x40000000:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    CPUID(0x40000000) returns a 12-byte vendor string; known values include
    "VBoxVBoxVBox" (VirtualBox), "VMwareVMware" (VMware), "KVMKVMKVM" (KVM),
    "Microsoft Hv" (Hyper-V), "XenVMMXenVMM" (Xen).

checking_hypervisor_bit_in_cpuid_feature_bits:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    pafish: same ECX bit 31 check via CPUID(0x1). VirtualBox always sets this bit,
    making it a reliable first-pass hypervisor indicator.

checking_cpuid_hypervisor_vendor_for_known_vm_vendors:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    pafish: CPUID(0x40000000) compared against a list of known hypervisor vendor strings.
    VirtualBox returns "VBoxVBoxVBox" on this leaf.

checking_interupt_descriptor_table_location:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    SIDT reads the IDT base address; a high byte of 0xFF indicates high-memory placement
    characteristic of VMware guests ("Red Pill" technique).

checking_local_descriptor_table_location:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    SLDT returns 0xDEAD0000 in some VM configurations; a non-zero LDT is unusual on
    native Windows and indicates a virtual environment.

checking_global_descriptor_table_location:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    SGDT reads the GDT base address; an 0xFF high byte indicates VM-specific
    high-memory placement of the GDT.

checking_store_task_register:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/cpu.html"
  description: >
    STR (Store Task Register) returns the current task register selector;
    VM-specific values distinguish virtual from physical execution environments.

# ── ACPI / BIOS / firmware fingerprinting ────────────────────────
checking_acpi_table_strings:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/firmware-tables.html"
  description: >
    Raw ACPI table scan via NtQuerySystemInformation finds virtualisation vendor
    strings ("VBOX", "INNOTEK", "VMWARE") in firmware tables that are absent on
    physical hardware.

checking_smbios_tables:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/firmware-tables.html"
  description: >
    SMBIOS raw table dump (provider 'RSMB', table 0) exposes BIOS and baseboard
    fields containing "VirtualBox", "VMware, Inc.", or "Parallels Software International".

checking_smbios_firmware:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/firmware-tables.html"
  description: >
    SMBIOS firmware strings queried via NtQuerySystemInformation contain
    hypervisor-specific vendor identifiers absent on physical hardware.

checking_reg_key_hardware_acpi_dsdt_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\HARDWARE\ACPI\DSDT\VBOX__ is created exclusively by VirtualBox ACPI
    firmware; never present on physical hardware.

checking_reg_key_hardware_acpi_fadt_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\HARDWARE\ACPI\FADT\VBOX__ is a VirtualBox-specific ACPI artifact
    created by the guest additions ACPI driver.

checking_reg_key_hardware_acpi_rsdt_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\HARDWARE\ACPI\RSDT\VBOX__ indicates VirtualBox RSDT firmware table
    registration; direct VirtualBox hypervisor fingerprint.

reg_key_hklm_hardware_acpi_dsdt_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    pafish: same HKLM\HARDWARE\ACPI\DSDT\VBOX__ check, corroborating al-khaser.

reg_key_hklm_hardware_acpi_fadt_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    pafish: HKLM\HARDWARE\ACPI\FADT\VBOX__ confirmed by pafish.

reg_key_hklm_hardware_acpi_rsdt_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    pafish: HKLM\HARDWARE\ACPI\RSDT\VBOX__ confirmed by pafish.

checking_reg_key_hardware_description_system_systembiosversion_is_set_to_vbox:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\HARDWARE\Description\System!SystemBiosVersion containing "VBOXBIOS"
    is a direct VirtualBox firmware fingerprint.

reg_key_hklm_hardware_description_system_systembiosversion:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    pafish: SystemBiosVersion registry value confirmed to contain VirtualBox BIOS string.

reg_key_hklm_hardware_description_system_videobiosversion:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    pafish: HKLM\HARDWARE\Description\System!VideoBiosVersion contains a
    VirtualBox-specific video BIOS string.

reg_key_hklm_hardware_description_system_systembiosdate:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    pafish: SystemBiosDate registry value is VirtualBox-specific.

# ── MAC address / NIC fingerprinting ─────────────────────────────
checking_mac_address_start_with_08_00_27:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 08:00:27 is assigned to PCS Systemtechnik GmbH and used exclusively by
    VirtualBox virtual NICs; detected via GetAdaptersAddresses.

checking_mac_address_hybrid_analysis:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    MAC address cross-checked against ranges used by Hybrid Analysis sandbox
    environments via GetAdaptersAddresses or WMI Win32_NetworkAdapterConfiguration.

checking_mac_starting_with_00_05_69:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 00:05:69 is a VMware-assigned prefix; its presence identifies a VMware
    virtual network adapter.

checking_mac_starting_with_00_0c_29:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 00:0C:29 is a VMware prefix used for standalone (non-vCenter) VM NICs.

checking_mac_starting_with_00_1c_14:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 00:1C:14 is a VMware prefix used for vSphere-hosted VM NICs.

checking_mac_starting_with_00_50_56:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 00:50:56 is a VMware prefix used for ESXi-managed VMs;
    the full range is 00:50:56:00:00:00–00:50:56:3F:FF:FF.

checking_mac_address_start_with_08_16_3e:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 08:16:3E is assigned to Citrix/XenServer; its presence reveals a Xen guest VM.

checking_mac_address_start_with_00_1c_42:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    OUI 00:1C:42 is the Parallels virtual NIC prefix; its presence identifies a
    Parallels Desktop VM.

looking_for_a_mac_address_starting_with_08_00_27:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    pafish: OUI 08:00:27 VirtualBox MAC prefix check, corroborating al-khaser.

# ── Disk / memory / hardware realism ─────────────────────────────
checking_hard_disk_size_using_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/hardware.html"
  description: >
    WMI Win32_LogicalDisk.Size ≤ 60 GB indicates an undersized virtual disk
    typical of sandbox provisioning.

checking_hard_disk_size_using_deviceiocontrol:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/hardware.html"
  description: >
    DeviceIoControl(IOCTL_DISK_GET_LENGTH_INFO) returns disk partition size;
    values ≤ 60 GB are characteristic of sandbox images.

checking_disk_size_using_getdiskfreespaceex:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/generic-os-queries.html"
  description: >
    GetDiskFreeSpaceEx returning ≤ 60 GB total space is a heuristic for detecting
    minimal VM storage allocation used by many sandbox providers.

checking_if_disk_size_60gb_via_getdiskfreespaceexa:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/hardware.html"
  description: >
    pafish: same 60 GB threshold check via GetDiskFreeSpaceExA.

checking_if_disk_size_60gb_via_deviceiocontrol:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/hardware.html"
  description: >
    pafish: disk size via DeviceIoControl, same 60 GB threshold.

checking_number_of_processors_in_machine:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/generic-os-queries.html"
  description: >
    GetSystemInfo or PEB.NumberOfProcessors < 2 indicates a single-core VM;
    sandboxes often allocate only one CPU to conserve host resources.

checking_number_of_cores_in_machine_using_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    WMI Win32_Processor.NumberOfCores < 2 is the WMI equivalent of the CPU-count
    check, fingerprinting underpowered sandbox VMs.

checking_setupdi_diskdrive:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/hardware.html"
  description: >
    SetupDiGetDeviceRegistryProperty enumerates disk device names; strings containing
    "QEMU", "VBOX", "VIRTUAL HD", or "VMware" identify virtual disk controllers.

checking_memory_space_using_globalmemorystatusex:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/generic-os-queries.html"
  description: >
    GlobalMemoryStatusEx returning < 1 GB RAM identifies under-provisioned
    sandbox VMs; real workstations have ≥ 4 GB.

# ── WMI hardware sensor absence ──────────────────────────────────
checking_win32_voltageprobe_with_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    Virtual machines do not emulate hardware voltage probes; an empty
    Win32_VoltageProbe result set indicates a VM environment.

checking_win32_portconnector_with_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    Win32_PortConnector (physical I/O port connectors) returns no instances
    in VMs; absence distinguishes virtual from physical hardware.

checking_cim_temperaturesensor_with_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    VMs lack thermal sensors; CIM_TemperatureSensor returning no instances
    is a reliable VM indicator.

checking_cim_voltagesensor_with_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    CIM_VoltageSensor (voltage monitoring hardware) is absent in all common
    hypervisors; empty results confirm a virtual environment.

checking_cpu_fan_using_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    Win32_Fan WMI class returns no instances on VMs because hypervisors do
    not expose cooling fan objects.

checking_current_temperature_using_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    MSAcpi_ThermalZoneTemperature being absent or unsupported via WMI indicates
    no physical thermal zone exists — characteristic of VMs.

checking_power_capabilities:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    GetSystemPowerStatus or WMI Win32_Battery returning no battery info reveals
    a headless VM without power management hardware.

# ── Registry artifacts (VBox, VMware, VPC, KVM, Xen, Parallels) ──
checking_reg_key_hardware_devicemap_scsi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\HARDWARE\DEVICEMAP\Scsi\...\Identifier containing "VBOX", "VMWARE",
    or "QEMU" exposes the virtual disk controller model via the PnP registry.

checking_services_disk_enum_entries_for_vm_strings:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\SYSTEM\ControlSet001\Services\Disk\Enum values containing VM vendor strings
    identify virtual disk devices registered with the Windows PnP manager.

checking_enum_ide_and_enum_scsi_entries_for_vm_strings:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    HKLM\SYSTEM\CurrentControlSet\Enum\IDE and Enum\SCSI key names containing
    VMware or VirtualBox product strings fingerprint the virtual storage controller.

# ── File artifacts (VBox, VMware drivers) ────────────────────────
checking_file_c_windows_system32_drivers_vboxmouse_sys:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    VirtualBox installs kernel drivers (VBoxMouse.sys, VBoxGuest.sys, VBoxSF.sys,
    VBoxVideo.sys) in System32\drivers; their presence directly identifies VirtualBox.

checking_file_c_windows_system32_drivers_vmnet_sys:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    VMware installs drivers (vmnet.sys, vmci.sys, vmx86.sys, vmmouse.sys) in
    System32\drivers; their presence identifies VMware Tools.

# ── Device artifacts ──────────────────────────────────────────────
checking_device_vboxguest:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    The \\.\VBoxGuest device object is created by VBoxGuest.sys and exists only
    inside a VirtualBox guest VM; CreateFile success confirms VirtualBox.

checking_device_hgfs:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    \\.\HGFS is the VMware Host-Guest Filesystem device; its presence indicates
    VMware Tools with shared folders enabled.

checking_device_vmci:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    \\.\vmci (VMware VMCI Bus) is a VMware-specific virtual device; successful
    open confirms a VMware guest environment.

# ── Process artifacts ─────────────────────────────────────────────
checking_virtualbox_process_vboxservice_exe:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    vboxservice.exe is the VirtualBox Guest Additions service; its presence in
    the process list via CreateToolhelp32Snapshot confirms a VirtualBox guest.

checking_virtualbox_process_vboxtray_exe:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    vboxtray.exe is the VirtualBox system tray helper; its presence confirms
    VirtualBox Guest Additions are running.

# ── WMI device checks ─────────────────────────────────────────────
checking_win32_pnpdevice_deviceid_from_wmi_for_vbox_pci_device:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    WMI Win32_PnPEntity.DeviceId containing "PCI\VEN_80EE&DEV_CAFE" is the
    VirtualBox PCI device identifier; no physical hardware uses this vendor ID.

checking_win32_pnpdevice_name_from_wmi_for_vbox_names:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    WMI Win32_PnPEntity.Name containing "VBOX" or "VirtualBox" strings exposes
    virtual device names injected by VirtualBox.

looking_for_vbox_devices_using_wmi:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/wmi.html"
  description: >
    pafish: same WMI PCI device query, corroborating al-khaser's detection.

# ── Generic sandbox artifacts ─────────────────────────────────────
checking_ntquerylicensevalue_with_kernel_vmdetection_private:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    NtQueryLicenseValue with the "Kernel-VMDetection-Private" license value
    directly returns whether the Windows kernel has detected a virtual machine.

vm_driver_services:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    Enumerating Windows services (SCM or ControlSet\Services) for VM-specific driver
    names (VBoxGuest, VBoxSF, vmci, xenevtchn) identifies the hypervisor through its
    installed kernel components.

check_if_machine_is_hosted_on_cloud:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/generic-os-queries.html"
  description: >
    HTTP calls to cloud metadata endpoints (AWS 169.254.169.254, Azure, GCP) or
    registry/BIOS checks for cloud provider strings detect cloud sandbox hosting.

checking_if_windows_is_genuine:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/registry.html"
  description: >
    Non-genuine Windows or known OEM/KMS product keys at
    HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion indicate pre-configured
    sandbox environments (Anubis/CwSandbox/JoeBox known product IDs).

checking_vmware_network_adapter_name:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    GetAdaptersInfo returning adapter descriptions containing "VMware" or "VMWARE"
    identifies a VMware virtual NIC without requiring MAC inspection.

checking_vboxtraytoolwndclass_vboxtraytoolwnd:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/processes.html"
  description: >
    FindWindow querying for "VBoxTrayToolWndClass" detects vboxtray.exe's hidden
    system window, present only inside VirtualBox guests.

checking_virtualbox_shared_folders_network_provider:
  mitre: "T1497.001"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/network.html"
  description: >
    WNetGetProviderName(WNNC_NET_RDR2SAMPLE) returning "VirtualBox Shared Folders"
    confirms a VirtualBox guest with shared folders enabled.

# ── User environment / behavioral ─────────────────────────────────
checking_mouse_movement:
  mitre: "T1497.002"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/generic-os-queries.html"
  description: >
    GetCursorPos sampled at two points detects a static cursor position; sandboxes
    that do not simulate user input leave the mouse at a fixed coordinate.

checking_lack_of_user_input:
  mitre: "T1497.002"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/generic-os-queries.html"
  description: >
    GetLastInputInfo measures milliseconds since the last keyboard or mouse event;
    an excessively long idle period indicates no human user is present.

check_if_time_has_been_accelerated:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    Compares GetTickCount readings before and after a Sleep call; if elapsed wall
    time is shorter than the requested delay, the sandbox is skipping sleep.


# ═══════════════════════════════════════════════════════════════════
# ANTI-DEBUG  (al-khaser: DEBUG + TLS flags  +  pafish debugger section)
# ═══════════════════════════════════════════════════════════════════

# ── TLS callbacks ─────────────────────────────────────────────────
tls_process_attach_callback:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    TLS callbacks execute before the process entry point; using them for anti-debug
    code detects debuggers that only break on OEP and miss pre-entry execution.

tls_thread_attach_callback:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    DLL_THREAD_ATTACH TLS callbacks fire on every thread creation; using them
    catches late-attached debuggers not present at process startup.

# ── API / PEB-based checks ────────────────────────────────────────
checking_isdebuggerpresent_api:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    kernel32!IsDebuggerPresent reads PEB.BeingDebugged and returns non-zero when
    a user-mode debugger is attached; simplest and most commonly used debugger check.

checking_peb_beingdebugged:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    Direct memory read of PEB offset 0x2 bypasses IsDebuggerPresent and detects
    debuggers that patch the API but not the PEB structure itself.

checking_checkremotedebuggerpresent_api:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    CheckRemoteDebuggerPresent wraps NtQueryInformationProcess(ProcessDebugPort)
    and detects debuggers attached from a different process.

checking_peb_ntglobalflag:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    PEB.NtGlobalFlag at offset 0x68 is set to 0x70 when a process is created under
    a debugger (FLG_HEAP_ENABLE_TAIL_CHECK | FLG_HEAP_ENABLE_FREE_CHECK | FLG_HEAP_VALIDATE_PARAMETERS).

checking_wudfisanydebuggerpresent_api:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    WudfIsAnyDebuggerPresent checks for both user-mode and kernel-mode debuggers
    in a single WDF-layer call.

# ── Heap flag tricks ──────────────────────────────────────────────
checking_processheap_flags:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    The Flags field of the first process heap (PEB.ProcessHeap) is 0x40000062
    under a debugger versus the normal 0x2; accessed directly without API calls.

checking_processheap_forceflags:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    ProcessHeap.ForceFlags is non-zero (typically 0x40000060) when a debugger
    created the process; directly read from heap memory.

checking_low_fragmentation_heap:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    In LFH-enabled heaps the SubSegmentCode field layout differs under a debugger
    due to heap flag modifications; malware inspects LFH internals to detect debug-time changes.

# ── NtQueryInformationProcess ─────────────────────────────────────
checking_ntqueryinformationprocess_with_processdebugport:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    NtQueryInformationProcess(ProcessDebugPort/0x07) returns -1 when a debugger
    is present; this is the native API underlying CheckRemoteDebuggerPresent.

checking_ntqueryinformationprocess_with_processdebugflags:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    NtQueryInformationProcess(ProcessDebugFlags/0x1F) returns 0 when the
    NoDebugInherit flag is clear, indicating an attached debugger.

checking_ntqueryinformationprocess_with_processdebugobject:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    NtQueryInformationProcess(ProcessDebugObjectHandle/0x1E) returns a non-NULL
    debug object handle when a debugger is attached; cannot be spoofed without kernel access.

# ── Thread / handle tricks ────────────────────────────────────────
checking_ntsetinformationthread_with_threadhidefromdebugger:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/interactive.html"
  description: >
    NtSetInformationThread(ThreadHideFromDebugger/0x11) hides the calling thread
    from the attached debugger so debug events from that thread are never delivered.

checking_closehandle_with_an_invalide_handle:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/object-handles.html"
  description: >
    Passing an invalid handle to CloseHandle raises EXCEPTION_INVALID_HANDLE only
    under a debugger; without one the call silently fails.

checking_closehandle_protected_handle_trick:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/object-handles.html"
  description: >
    A HANDLE_FLAG_PROTECT_FROM_CLOSE handle is closed; the exception behavior
    differs between debugged and non-debugged execution.

checking_ntsystemdebugcontrol:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    NtSystemDebugControl requires debug privileges and succeeds only when a
    kernel debugger (or sufficiently privileged user-mode debugger) is active.

# ── Exception-based detection ─────────────────────────────────────
checking_unhandledexcepfiltertest:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/exceptions.html"
  description: >
    SetUnhandledExceptionFilter registers a custom top-level handler, then INT3
    is raised; if the custom handler is not called, a debugger intercepted the exception.

checking_outputdebugstring:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/interactive.html"
  description: >
    Pre-Vista: OutputDebugString modifies GetLastError to 0 when a debugger is
    listening; checking the error code before and after detects the change.

# ── Breakpoint detection ──────────────────────────────────────────
checking_hardware_breakpoints:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/process-memory.html"
  description: >
    GetThreadContext retrieves debug registers DR0–DR3; non-zero values indicate
    hardware breakpoints set by an attached debugger.

checking_software_breakpoints:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/process-memory.html"
  description: >
    Scanning executable code regions for 0xCC bytes (INT3 opcode) detects software
    breakpoints injected by debuggers.

checking_memory_breakpoints_page_guard:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/process-memory.html"
  description: >
    Allocating a PAGE_GUARD executable page and jumping into it produces
    STATUS_GUARD_PAGE_VIOLATION normally; debuggers consume this exception first.

checking_for_page_exception_breakpoints:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/process-memory.html"
  description: >
    Memory-access breakpoints in debuggers consume STATUS_GUARD_PAGE_VIOLATION before
    the exception handler; checking whether the handler runs detects these breakpoints.

checking_interupt_0x2d:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/assembly.html"
  description: >
    INT 0x2D is the kernel debugger breakpoint interrupt; on a debugged process it
    causes a one-byte EIP increment detectable via exception routing.

checking_interupt_1:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/assembly.html"
  description: >
    INT 1 (ICE/0xF1 opcode) generates EXCEPTION_SINGLE_STEP; under active tracing
    the debugger suppresses the exception, providing a tracing detector.

checking_trap_flag:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/assembly.html"
  description: >
    PUSHFD/OR [ESP],0x100/POPFD sets the Trap Flag; the resulting SINGLE_STEP
    exception is suppressed by debuggers performing single-step tracing.

# ── Kernel debugger ───────────────────────────────────────────────
checking_ntquerysysteminformation_with_systemkerneldebuggerinformation:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    NtQuerySystemInformation(SystemKernelDebuggerInformation/0x23) returns
    KdDebuggerEnabled and KdDebuggerNotPresent flags directly from the kernel.

checking_shareduserdata_kddebuggerenabled:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    KUSER_SHARED_DATA at fixed address 0x7FFE0000 contains KdDebuggerEnabled at
    offset 0x2D4; reading it directly detects kernel debuggers without API calls.

# ── Misc ──────────────────────────────────────────────────────────
checking_if_parent_process_is_explorer_exe:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    NtQueryInformationProcess(ProcessBasicInformation) retrieves the parent PID;
    if not explorer.exe, the process was spawned by a script or analysis framework.

checking_sedebugprivilege:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    Checking for SeDebugPrivilege probes whether the process was launched with
    debug privileges, characteristic of debugger-attached environments.

checking_ntqueryobject_with_objecttypeinformation:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/object-handles.html"
  description: >
    NtQueryObject(ObjectTypeInformation) on a handle queries the kernel object type;
    combined with AllTypesInformation to enumerate all debug objects system-wide.

checking_ntqueryobject_with_objectalltypesinformation:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/object-handles.html"
  description: >
    NtQueryObject(ObjectAllTypesInformation/3) returns counts of all kernel object
    types; a non-zero DebugObject count indicates a debugger is or was running.

checking_ntyieldexecution:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    NtYieldExecution returns STATUS_NO_YIELD_PERFORMED when single-stepping prevents
    normal thread scheduling; consecutive failures detect active single-step tracing.

checking_if_process_is_in_a_job:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    IsProcessInJob / NtQueryInformationProcess(ProcessInJobObject) detects whether
    the process is running inside a Windows Job Object, commonly used by sandboxes.

checking_virtualalloc_write_watch_buffer_only:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    VirtualAlloc(MEM_WRITE_WATCH) allocates memory that tracks writes; GetWriteWatch
    after a known write sequence detects unexpected writes by a debugger.

checking_for_api_hooks_outside_module_bounds:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/process-memory.html"
  description: >
    Scanning the first bytes of API functions for JMP/CALL instructions pointing
    outside the module's memory range detects inline hooks injected by debuggers.

walking_process_memory_for_hidden_modules:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/misc.html"
  description: >
    Manually walking VirtualQueryEx results against the PEB module list detects DLLs
    loaded without updating the loader's linked list — a common debugger stealth technique.

# ── pafish anti-debug ─────────────────────────────────────────────
using_isdebuggerPresent:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    pafish: kernel32!IsDebuggerPresent reads PEB.BeingDebugged to detect an attached
    user-mode debugger.

using_beingdebugged_via_peb_access:
  mitre: "T1622"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/debug-flags.html"
  description: >
    pafish: direct memory read of PEB.BeingDebugged; detects debuggers that patch
    IsDebuggerPresent but leave the PEB flag intact.


# ═══════════════════════════════════════════════════════════════════
# TIMING ATTACKS  (al-khaser: TIMING_ATTACKS flag  +  pafish CPU/Generic sections)
# ═══════════════════════════════════════════════════════════════════

performing_a_sleep_using_ntdelayexecution:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    NtDelayExecution is the native syscall underlying Sleep; elapsed time is compared
    before and after to detect sandboxes that artificially accelerate delays.

performing_a_sleep_in_a_loop:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    Calling sleep() in a loop accumulates delays; GetTickCount after the loop
    detects sandboxes that collapse the total elapsed time.

delaying_execution_using_settimer:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    SetTimer schedules a WM_TIMER callback after a specified delay; measuring the
    actual interval via GetTickCount detects sandboxes that collapse timer intervals.

delaying_execution_using_timesetevent:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    timeSetEvent (multimedia timer) schedules high-resolution callbacks; elapsed-time
    comparison detects sandboxes that skip multimedia timer delays.

delaying_execution_using_waitforsingleobject:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    WaitForSingleObject with a timer or event and known timeout; elapsed-time
    comparison before and after detects sleep-skipping sandboxes.

delaying_execution_using_waitformultipleobjects:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    WaitForMultipleObjects variant of the timing check; same elapsed-time comparison
    methodology applied to a set of waitable objects.

delaying_execution_using_icmpsendecho:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    IcmpSendEcho with a large timeout is an unconventional sleep that many sandboxes
    fail to intercept; actual elapsed time is compared via GetTickCount.

delaying_execution_using_createwaitabletimer:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    CreateWaitableTimer + WaitForSingleObject creates a kernel timer object;
    elapsed wall-clock time is compared to the requested delay to detect acceleration.

delaying_execution_using_createtimerqueuetimer:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    CreateTimerQueueTimer schedules a callback in a timer queue; elapsed-time
    measurement detects sandboxes that compress the callback interval.

checking_rdtsc_locky_trick:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/timing.html"
  description: >
    Named after Locky ransomware: measures RDTSC delta across two points; a delta
    smaller than expected reveals sandbox time dilation or VM overhead removal.

checking_rdtsc_which_force_a_vm_exit_cpuid:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/timing.html"
  description: >
    RDTSC before and after a CPUID instruction; CPUID forces a VM exit on
    hypervisors adding 1000+ cycles, revealing the hypervisor layer via timing alone.

# pafish timing
checking_the_difference_between_cpu_timestamp_counters_rdtsc:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/timing.html"
  description: >
    pafish: RDTSC sampled before and after a code block; an anomalously large delta
    indicates debugger overhead or VM timing instrumentation.

checking_the_difference_between_cpu_timestamp_counters_rdtsc_forcing_vm_exit:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Anti-Debug/techniques/timing.html"
  description: >
    pafish: RDTSC bracketing a CPUID instruction; CPUID forces a VM exit on all
    hypervisors, creating detectable cycle overhead in the TSC delta.

checking_if_sleep_is_patched_using_gettickcount:
  mitre: "T1497.003"
  checkpoint: "https://evasions.checkpoint.com/src/Evasions/techniques/timing.html"
  description: >
    pafish: Sleep(N) followed by GetTickCount comparison; if less than N ms elapsed,
    the sandbox hooked Sleep and collapsed the delay.


